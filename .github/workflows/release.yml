name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\build_release.ps1

      - name: Resolve installer
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $package = "releases/codex-bubble-setup-v$version.exe"
          if (!(Test-Path -LiteralPath $package)) {
            throw "Release installer not found: $package"
          }
          "package=$package" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Codex 额度悬浮球 ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: ${{ steps.package.outputs.package }}
